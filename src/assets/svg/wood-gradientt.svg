<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neutralWoodGrain" x="0" y="0" width="100%" height="100%">
      <!-- baseFrequency 0.01 0.3 tworzy bardzo długie, pionowe pory -->
      <feTurbulence type="fractalNoise" baseFrequency="0.01 0.3" numOctaves="4" result="noise" />
      
      <!-- Konwersja szumu na skale szarości i zwiększenie kontrastu -->
      <feColorMatrix in="noise" type="matrix" 
        values="0 0 0 0 0.2 
                0 0 0 0 0.2 
                0 0 0 0 0.2 
                0 0 0 1 0" result="greyStructure" />
      
      <!-- Nałożenie struktury na tło -->
      <feBlend in="greyStructure" in2="SourceGraphic" mode="multiply" />
    </filter>
  </defs>

  <!-- Neutralne, szare tło (kolor bazowy) -->
  <rect width="100%" height="100%" fill="#D1D1D1" />

  <!-- Warstwa z teksturą porów -->
  <rect width="100%" height="100%" filter="url(#neutralWoodGrain)" opacity="0.5" />
  
  <!-- Subtelne rozjaśnienia (imitacja naturalnych różnic w gęstości włókien) -->
  <rect width="100%" height="100%" fill="url(#neutralGradient)" opacity="0.4" />
  
  <defs>
    <linearGradient id="neutralGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.1" />
      <stop offset="40%" stop-color="#000000" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.1" />
    </linearGradient>
  </defs>
</svg>
